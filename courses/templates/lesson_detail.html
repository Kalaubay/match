{% extends 'base.html' %}
{% block title %}{{ lesson.title }}{% endblock %}

{% block extra_css %}
<style>
    .video-card{background:#fff;padding:24px;border-radius:16px;border:1px solid var(--border);max-width:650px;width:100%;margin:0 auto}
    .video-container{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;background:#000;margin-top:15px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
    .back-btn{display:inline-block;margin-bottom:20px;text-decoration:none;color:var(--primary);font-weight:600;font-size:15px;transition:.2s}
    .back-btn:hover{transform:translateX(-5px)}
    @media(max-width:768px){.video-card{padding:15px;border-radius:12px;border:none}.video-card h2{font-size:18px;line-height:1.4;margin-bottom:10px}.video-container{border-radius:6px;margin-top:10px}.back-btn{font-size:14px;margin-bottom:15px}}
</style>
{% endblock %}

{% block content %}
    <a href="{% url 'lesson_list' %}" class="back-btn">← Сабақтар тізіміне қайту</a>
    <div class="video-card">
        <h2>{{ lesson.title }}</h2>
        <div class="video-container" id="player-wrapper">{{ lesson.video_iframe|safe }}</div>
    </div>
    <script>
        var tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";
        var firstScriptTag=document.getElementsByTagName('script')[0];firstScriptTag.parentNode.insertBefore(tag,firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady(){
            var f=document.querySelector('#player-wrapper iframe');
            if(f){f.id="youtube-player";var s=f.src;if(s.indexOf('enablejsapi=1')===-1)f.src=s+(s.indexOf('?')===-1?'?':'&')+'enablejsapi=1';
            player=new YT.Player('youtube-player',{events:{'onStateChange':onPlayerStateChange}})}
        }
        function onPlayerStateChange(e){
            if(e.data==YT.PlayerState.ENDED){
                fetch("{% url 'complete_lesson' lesson.id %}",{method:"POST",headers:{"X-CSRFToken":"{{ csrf_token }}","X-Requested-With":"XMLHttpRequest"}})
                .then(r=>{if(r.ok){alert("Керемет! Келесі сабақ ашылды!");window.location.href="{% url 'lesson_list' %}"}})
            }
        }
    </script>
{% endblock %}
